# =========================================
# APPLICATION
# =========================================
spring.application.name=finanzapp
server.port=8081

# =========================================
# DATABASE (H2)
# =========================================
spring.datasource.url=jdbc:h2:file:./data/finanzapp;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================================
# FLYWAY
# =========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================
# LOGGING
# =========================================
logging.level.root=INFO
logging.level.com.finanzmanager=DEBUG
logging.level.org.flywaydb=DEBUG
logging.file.name=logs/finanzapp.log

# =========================================
# CUSTOM APP PROPERTIES
# =========================================
app.name=FinanzApp
app.default-currency=EUR
app.max-transactions=500

# =========================================
# SWAGGER
# =========================================
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packagesToScan=com.finanzmanager.finanzapp.controller

# =========================================
# ACTUATOR
# =========================================

# Nur wichtige Endpoints exponieren
management.endpoints.web.exposure.include=health,info,metrics,loggers,prometheus

# Health Details anzeigen
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# =========================================
# INFO ENDPOINT (direkte Werte, stabil)
# =========================================
info.app.name = FinanzApp
info.app.version=0.0.1
info.app.currency=EUR
info.app.max-transactions=500